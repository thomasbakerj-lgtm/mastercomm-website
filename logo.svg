<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="MasterComm International">
  <defs>
    <linearGradient id="gGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE3A8"/>
      <stop offset="45%" stop-color="#F4B233"/>
      <stop offset="100%" stop-color="#C8881B"/>
    </linearGradient>
    <radialGradient id="gGem" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#FF8398"/>
      <stop offset="100%" stop-color="#E11D3F"/>
    </radialGradient>
  </defs>

  <!-- seal: trust / credential / enterprise / global -->
  <circle cx="50" cy="50" r="48.5" fill="none" stroke="url(#gGold)" stroke-opacity="0.55" stroke-width="1.2"/>
  <circle cx="50" cy="50" r="44.6" fill="none" stroke="#F4B233" stroke-opacity="0.22" stroke-width="0.7"/>

  <!-- guiding star (the course a trusted advisor charts) -->
  <path d="M50.0,14.0 L50.99,24.6 L53.68,23.32 L52.4,26.01 L63.0,27.0 L52.4,27.99 L53.68,30.68 L50.99,29.4 L50.0,40.0 L49.01,29.4 L46.32,30.68 L47.6,27.99 L37.0,27.0 L47.6,26.01 L46.32,23.32 L49.01,24.6 Z" fill="url(#gGold)"/>
  <circle cx="50" cy="27" r="2.2" fill="url(#gGem)"/>

  <!-- M monogram: established, ownable, enterprise -->
  <path d="M33,69 L33,46 L50,58 L67,46 L67,69"
        fill="none" stroke="url(#gGold)" stroke-width="5.4"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- foundation rule: stability / grounding -->
  <path d="M37,75.5 L63,75.5" stroke="#F4B233" stroke-opacity="0.45" stroke-width="1.6" stroke-linecap="round"/>
</svg>
